<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Mini Social{% endblock %}</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background-color: #f7f9fa;
        margin: 0;
        display: flex;
        justify-content: center;
      }
      .container {
        display: grid;
        grid-template-columns: 250px 600px;
        gap: 20px;
        max-width: 900px;
        width: 100%;
        margin-top: 20px;
      }
      /* Sidebar */
      .sidebar {
        position: sticky;
        top: 20px;
        height: fit-content;
      }
      .nav-link {
        display: block;
        padding: 10px 15px;
        color: #0f1419;
        text-decoration: none;
        font-size: 20px;
        font-weight: bold;
        border-radius: 30px;
        margin-bottom: 10px;
      }
      .nav-link:hover {
        background-color: #e8f5fe;
        color: #1da1f2;
      }
      .user-card {
        margin-top: 20px;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 50px;
      }
      .user-card:hover {
        background-color: #e7e7e8;
      }
      .avatar-small {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #ccc;
        object-fit: cover;
      }
      /* Main Content */
      .main-content {
        border: 1px solid #eff3f4;
        background-color: white;
        min-height: 100vh;
      }
      .header {
        padding: 15px;
        border-bottom: 1px solid #eff3f4;
        font-weight: bold;
        font-size: 20px;
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      /* Components */
      .btn {
        background-color: #1da1f2;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn:hover {
        background-color: #1a91da;
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div style="padding: 10px; font-size: 30px; color: #1da1f2">🐦</div>
        <a href="{% url 'feed' %}" class="nav-link">Home</a>
        {% if user.is_authenticated %}
        <a href="#" class="nav-link">Profile</a>
        <!-- Placeholder for now -->
        <a href="{% url 'logout' %}" class="nav-link">Logout</a>

        <div class="user-card">
          <div class="avatar-small"></div>
          <!-- TODO: Real Avatar -->
          <div style="font-size: 15px">
            <div style="font-weight: bold">{{ user.username }}</div>
            <div style="color: #536471">@{{ user.username }}</div>
          </div>
        </div>
        {% else %}
        <a href="{% url 'login' %}" class="nav-link">Login</a>
        {% endif %}
      </div>

      <!-- Main Content -->
      <div class="main-content">{% block content %}{% endblock %}</div>
    </div>
  </body>
</html>
